<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/x-icon" href="./imp/LOGO.jpeg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Messho Player</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="stylesheet" href="index.css">
</head>

<body>

    <nav>
        <div class="img-logo-1">
            <div class="img-logo">
                <img src="./imp/LOGO.jpeg" alt="">
            </div>
            <p>player</p>
        </div>
        <div class="search-bar">
            <input type="text" class="input-search" placeholder="What do you want to play?">
            <div class="search-suggestions"></div>
            <i class="ri-search-line"></i>
        </div>
        <div class="add-song">
            <i class="ri-add-line"></i>
            <p>Create</p>
        </div>
    </nav>


    <main>
        <div class="side-nav">
            <div class="dle-panel">




            </div>
            <div class="add-new-songs">
                <h2 id="head">Add New Song</h2>
                <input type="text" placeholder="Songename" id="set-name" class="color">
                <input type="text" class="color" placeholder="Img URl" id="save-song">
                <div id="add-file"> Audio files</div>
                <input id="click" style="visibility: hidden;" type="file" hidden>
                <button id="submitbtn">ADD</button>

            </div>
            <div class="side-box" id="home">
                <i class="ri-home-4-line"></i>
                <p>Home</p>
            </div>
            <div class="side-box" id="Add-song">
                <i class="ri-add-fill"></i>
                <p>Add Song</p>
            </div>
            <div class="side-box">
                <i class="ri-database-2-line"></i>
                <p>All Song</p>
            </div>
            <div class="side-box" id="Dle">
                <i class="ri-folder-close-line"></i>
                <p>Delete</p>
            </div>
        </div>

        <div class="music-play">
            <h2>
                Now playing
            </h2>
            <div class="play-img-song">
                <img src="" alt="No playing Current">
            </div>
            <div class="information-song">
                <p>Choice the Song</p>
            </div>
            <input type="range" min="0" max="100" class="Timeline" value="0">
            <audio id="Player"></audio>
            <div class="play-btns">
                <i class="ri-rewind-mini-fill plbtn" id="Backbtn"></i>
                <i class="ri-play-circle-fill plbtn" id="main-play"></i>
                <i class="ri-speed-mini-fill plbtn" id="Nextbtn"></i>
            </div>
        </div>


        <div class="track-play">
            <h1>Track List</h1>

            <div class="track-Songs">





            </div>


        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script type="module" src="index.js"></script>
</body>

</html>
